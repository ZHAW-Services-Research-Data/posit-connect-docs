# ---------------------------------------------------------------------------
# Site metadata
# ---------------------------------------------------------------------------
site_name: "Posit Connect – Dokumentation"
site_description: "Interne Dokumentation für Posit Connect an der ZHAW"
# site_url must be the full base URL so that alternate links resolve correctly
# on GitHub Pages project sites (which are served under a subdirectory).
# Update this if you use a custom domain.
site_url: https://zhaw-dataservices.github.io/posit-connect-docs/
repo_url: https://github.com/zhaw-dataservices/posit-connect-docs
repo_name: zhaw-dataservices/posit-connect-docs

# ---------------------------------------------------------------------------
# Theme — Material for MkDocs
# font: false disables the Google Fonts request so we can use Arial via CSS.
# ---------------------------------------------------------------------------
theme:
  name: material
  logo: assets/zhaw-logo.svg
  favicon: assets/zhaw-logo.svg
  font: false             # disable Google Fonts; Arial is set via extra_css
  palette:
    scheme: default
    primary: custom       # resolved via extra_css to #0064a6
  language: de
  features:
    - navigation.top      # back-to-top button

# ---------------------------------------------------------------------------
# Custom CSS
# ---------------------------------------------------------------------------
extra_css:
  - stylesheets/extra.css

# ---------------------------------------------------------------------------
# Language switcher — renders the globe icon + dropdown in the Material header.
# Full absolute URLs are required; root-relative paths (/en/) break on GitHub
# Pages project sites because the site is not served from the domain root.
# ---------------------------------------------------------------------------
extra:
  alternate:
    - name: Deutsch
      link: https://zhaw-dataservices.github.io/posit-connect-docs/
      lang: de
    - name: English
      link: https://zhaw-dataservices.github.io/posit-connect-docs/en/
      lang: en

# ---------------------------------------------------------------------------
# Plugins
# mkdocs-static-i18n reads the file suffix (.en.md / .md) to serve translated
# pages. "de" is the default; the English build is published under /en/.
# The language switcher appears automatically in the Material header.
# Install: pip install mkdocs-static-i18n
# ---------------------------------------------------------------------------
plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: de
          default: true
          name: Deutsch
          build: true
        - locale: en
          name: English
          build: true

# ---------------------------------------------------------------------------
# Navigation — list pages explicitly so the order is predictable.
# Each entry is: "Menu label": path/to/file.md
# ---------------------------------------------------------------------------
nav:
  - Home: index.md
  - Ablauf im Überblick: ablauf.md
  - Nutzungsabklärung: nutzungsabklaerung.md
  - App entwickeln:
    - Template verwenden: app-entwickeln/template.md
    - Bestehende App einbinden: app-entwickeln/bestehende-app.md
    - Best Practices: app-entwickeln/best-practices.md
    - Datensparsamkeit & Daten: app-entwickeln/daten.md
    - REDCap-Integration: app-entwickeln/redcap.md
  - Code teilen & Deployment vorbereiten:
    - Repository auf github.zhaw.ch: code-teilen/github-zhaw.md
    - GitHub.com als Alternative: code-teilen/github-com.md
    - manifest.json erstellen: code-teilen/manifest.md
  - Deployment: deployment.md
  - Support & FAQ: support.md
