# ---------------------------------------------------------------------------
# Site metadata
# ---------------------------------------------------------------------------
site_name: "Posit Connect – Dokumentation"
site_description: "Interne Dokumentation für Posit Connect an der ZHAW"
# site_url must be the full base URL so that alternate links resolve correctly
# on GitHub Pages project sites (which are served under a subdirectory).
# Update this if you use a custom domain.
site_url: https://zhaw-services-research-data.github.io/posit-connect-docs/
repo_url: https://github.com/zhaw-services-research-data/posit-connect-docs
repo_name: zhaw-services-research-data/posit-connect-docs

# ---------------------------------------------------------------------------
# Theme — Material for MkDocs
# Primary color uses ZHAW corporate blue (#0064a6).
# logo: place the white/negative ZHAW logo at docs/assets/logo.png.
# font: false disables the Google Fonts request so we can use Arial via CSS.
# ---------------------------------------------------------------------------
theme:
  name: material
  logo: assets/zhaw-logo-negativ.png   # white (negative) ZHAW logo — place file at docs/assets/logo.png
  favicon: assets/zhaw-logo.png
  font: false             # disable Google Fonts; Arial is set via extra_css
  palette:
    scheme: default
    primary: custom       # resolved via extra_css to #0064a6
  language: de
  features:
    - navigation.top      # back-to-top button

# ---------------------------------------------------------------------------
# Custom CSS — overrides the Material primary color with the exact ZHAW hex.
# The file must exist at docs/stylesheets/extra.css.
# ---------------------------------------------------------------------------
extra_css:
  - stylesheets/extra.css

# ---------------------------------------------------------------------------
# Language switcher — renders the globe icon + dropdown in the Material header.
# Full absolute URLs are required; root-relative paths (/en/) break on GitHub
# Pages project sites because the site is not served from the domain root.
# ---------------------------------------------------------------------------
extra:
  alternate:
    - name: Deutsch
      link: https://zhaw-services-research-data.github.io/posit-connect-docs/
      lang: de
    - name: English
      link: https://zhaw-services-research-data.github.io/posit-connect-docs/en/
      lang: en

# ---------------------------------------------------------------------------
# Plugins
# mkdocs-static-i18n reads the file suffix (.en.md / .md) to serve translated
# pages. "de" is the default; the English build is published under /en/.
# The language switcher appears automatically in the Material header.
# Install: pip install mkdocs-static-i18n
# ---------------------------------------------------------------------------
plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: de
          default: true
          name: Deutsch
          build: true
        - locale: en
          name: English
          build: true

# ---------------------------------------------------------------------------
# Navigation — list pages explicitly so the order is predictable.
# Each entry is: "Menu label": path/to/file.md
# ---------------------------------------------------------------------------
nav:
  - Home: index.md
  - Erste Schritte: erste-schritte.md
