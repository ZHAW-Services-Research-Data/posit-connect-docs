<svg viewBox="0 0 760 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Arial, sans-serif">
  <title>Posit Connect – Process Overview</title>
  <desc>Process from usage assessment and app development to deployment on Posit Connect.</desc>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#333333"/>
    </marker>
  </defs>

  <rect width="760" height="720" fill="#ffffff"/>

  <!-- PARALLEL BAND -->
  <rect x="16" y="16" width="728" height="215" rx="8" fill="#f7f7f7" stroke="#cccccc" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="380" y="37" font-size="11" fill="#666666" text-anchor="middle" font-style="italic">Steps 1 and 2 can be completed independently and in any order</text>

  <!-- STEP 1 -->
  <rect x="28" y="46" width="340" height="160" rx="6" fill="white" stroke="#333333" stroke-width="1.5"/>
  <rect x="28" y="46" width="4" height="160" rx="2" fill="#333333"/>
  <rect x="38" y="55" width="22" height="18" rx="3" fill="#333333"/>
  <text x="49" y="68" font-size="11" fill="white" font-weight="bold" text-anchor="middle">1</text>
  <text x="68" y="68" font-size="15" fill="#333333" font-weight="bold">Usage Assessment</text>
  <line x1="32" y1="80" x2="362" y2="80" stroke="#333333" stroke-width="0.7" opacity="0.3"/>
  <circle cx="46" cy="102" r="3.5" fill="#333333"/>
  <text x="56" y="106" font-size="13" fill="#333333">Self Service Portal (SSP)</text>
  <text x="56" y="120" font-size="11" fill="#666666">Assessment before publication</text>
  <circle cx="46" cy="142" r="3.5" fill="#333333"/>
  <text x="56" y="146" font-size="13" fill="#333333">Initial contact</text>
  <text x="56" y="160" font-size="11" fill="#666666">We discuss the next steps together</text>

  <!-- STEP 2 -->
  <rect x="382" y="46" width="350" height="160" rx="6" fill="white" stroke="#333333" stroke-width="1.5"/>
  <rect x="382" y="46" width="4" height="160" rx="2" fill="#333333"/>
  <rect x="392" y="55" width="22" height="18" rx="3" fill="#333333"/>
  <text x="403" y="68" font-size="11" fill="white" font-weight="bold" text-anchor="middle">2</text>
  <text x="422" y="68" font-size="15" fill="#333333" font-weight="bold">Develop App</text>
  <line x1="386" y1="80" x2="726" y2="80" stroke="#333333" stroke-width="0.7" opacity="0.3"/>
  <circle cx="398" cy="100" r="3.5" fill="#333333"/>
  <text x="408" y="104" font-size="13" fill="#333333">Use template</text>
  <text x="408" y="118" font-size="11" fill="#666666">Shiny (R) · Streamlit (Python) · Quarto</text>
  <circle cx="398" cy="134" r="3.5" fill="#333333"/>
  <text x="408" y="138" font-size="13" fill="#333333">Best Practices &amp; Corporate Design</text>
  <circle cx="398" cy="154" r="3.5" fill="#333333"/>
  <text x="408" y="158" font-size="13" fill="#333333">Generate manifest.json</text>
  <text x="408" y="172" font-size="11" fill="#666666">write_manifest.R · write_manifest.py</text>

  <!-- CONVERGING PATHS -->
  <line x1="198" y1="206" x2="198" y2="244" stroke="#333333" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="198" y1="248" x2="377" y2="248" stroke="#333333" stroke-width="1.8"/>
  <line x1="557" y1="206" x2="557" y2="244" stroke="#333333" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="557" y1="248" x2="383" y2="248" stroke="#333333" stroke-width="1.8"/>
  <circle cx="380" cy="248" r="3" fill="#333333"/>
  <line x1="380" y1="248" x2="380" y2="276" stroke="#333333" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- STEP 3 -->
  <rect x="60" y="278" width="640" height="88" rx="6" fill="white" stroke="#333333" stroke-width="1.5"/>
  <rect x="60" y="278" width="4" height="88" rx="2" fill="#333333"/>
  <rect x="70" y="288" width="22" height="18" rx="3" fill="#333333"/>
  <text x="81" y="301" font-size="11" fill="white" font-weight="bold" text-anchor="middle">3</text>
  <text x="100" y="301" font-size="15" fill="#333333" font-weight="bold">Share Code</text>
  <line x1="64" y1="312" x2="694" y2="312" stroke="#333333" stroke-width="0.7" opacity="0.3"/>
  <circle cx="78" cy="331" r="3.5" fill="#333333"/>
  <text x="88" y="335" font-size="13" fill="#333333">github.zhaw.ch</text>
  <text x="88" y="349" font-size="11" fill="#666666">Standard case — ZHAW GitHub Enterprise</text>
  <circle cx="410" cy="331" r="3.5" fill="#999999"/>
  <text x="420" y="335" font-size="13" fill="#666666">GitHub.com</text>
  <text x="420" y="349" font-size="11" fill="#999999">Exception depending on data context</text>

  <!-- ARROW TO STEP 4 -->
  <line x1="380" y1="366" x2="380" y2="395" stroke="#333333" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- STEP 4 -->
  <rect x="60" y="398" width="640" height="116" rx="6" fill="white" stroke="#333333" stroke-width="1.5"/>
  <rect x="60" y="398" width="4" height="116" rx="2" fill="#333333"/>
  <rect x="70" y="408" width="22" height="18" rx="3" fill="#333333"/>
  <text x="81" y="421" font-size="11" fill="white" font-weight="bold" text-anchor="middle">4</text>
  <text x="100" y="421" font-size="15" fill="#333333" font-weight="bold">Review by ZHAW Services Research Data</text>
  <line x1="64" y1="432" x2="694" y2="432" stroke="#333333" stroke-width="0.7" opacity="0.3"/>
  <circle cx="78" cy="450" r="3.5" fill="#333333"/>
  <text x="88" y="454" font-size="13" fill="#333333">Best Practices</text>
  <circle cx="78" cy="470" r="3.5" fill="#333333"/>
  <text x="88" y="474" font-size="13" fill="#333333">Corporate Design</text>
  <circle cx="78" cy="490" r="3.5" fill="#333333"/>
  <text x="88" y="494" font-size="13" fill="#333333">Data Protection &amp; Minimisation</text>
  <circle cx="410" cy="450" r="3.5" fill="#333333"/>
  <text x="420" y="454" font-size="13" fill="#333333">Metadata &amp; Project Assignment</text>
  <circle cx="410" cy="470" r="3.5" fill="#333333"/>
  <text x="420" y="474" font-size="13" fill="#333333">Access Rights</text>
  <circle cx="410" cy="490" r="3.5" fill="#333333"/>
  <text x="420" y="494" font-size="13" fill="#333333">EOL</text>

  <!-- REVISION LOOP -->
  <path d="M 700,456 C 742,456 742,322 700,322" stroke="#c11e48" stroke-width="1.8" fill="none"/>
  <rect x="706" y="380" width="52" height="20" rx="3" fill="#c11e48"/>
  <text x="732" y="394" font-size="11" fill="white" font-weight="bold" text-anchor="middle">Revision</text>

  <!-- OK LINE -->
  <line x1="380" y1="514" x2="380" y2="558" stroke="#00795d" stroke-width="1.8"/>
  <rect x="360" y="526" width="40" height="20" rx="3" fill="#00795d"/>
  <text x="380" y="540" font-size="11" fill="white" font-weight="bold" text-anchor="middle">OK</text>

  <!-- STEP 5 -->
  <rect x="60" y="562" width="640" height="100" rx="6" fill="white" stroke="#333333" stroke-width="1.5"/>
  <rect x="60" y="562" width="4" height="100" rx="2" fill="#333333"/>
  <rect x="70" y="572" width="22" height="18" rx="3" fill="#333333"/>
  <text x="81" y="585" font-size="11" fill="white" font-weight="bold" text-anchor="middle">5</text>
  <text x="100" y="585" font-size="15" fill="#333333" font-weight="bold">Deployment on Posit Connect</text>
  <line x1="64" y1="596" x2="694" y2="596" stroke="#333333" stroke-width="0.7" opacity="0.3"/>
  <circle cx="78" cy="614" r="3.5" fill="#333333"/>
  <text x="88" y="618" font-size="13" fill="#333333">App live — URL will be shared</text>
  <circle cx="410" cy="614" r="3.5" fill="#333333"/>
  <text x="420" y="618" font-size="13" fill="#333333">Access rights configured</text>
  <circle cx="78" cy="638" r="3.5" fill="#333333"/>
  <text x="88" y="642" font-size="13" fill="#333333">Marketing / Communication (if applicable)</text>
  <circle cx="410" cy="638" r="3.5" fill="#333333"/>
  <text x="420" y="642" font-size="13" fill="#333333">Updates as needed</text>

  <!-- FOOTER -->
  <text x="380" y="700" font-size="10" fill="#999999" text-anchor="middle">ZHAW Services Research Data · Interactive Data Visualisation · Posit Connect</text>
</svg>
